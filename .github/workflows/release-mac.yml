name: Release macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: masaustu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: masaustu/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate icns icon
        run: node scripts/generate-icns.js

      - name: Build & Publish macOS
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish:mac
