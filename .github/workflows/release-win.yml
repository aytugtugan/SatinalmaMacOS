name: Release Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-win:
    if: github.repository == 'aytugtugan/SatinalmaWin'
    runs-on: windows-latest

    defaults:
      run:
        working-directory: masaustu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: masaustu/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish:win
